version: "3.9"

services:
  api:
    build: .
    container_name: student_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////app/data/student_management.db
      REDIS_URL: redis://redis:6379
      SECRET_KEY: change_this_in_production_please
    volumes:
      - ./logs:/app/logs
      - db_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: student_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
